image: python:3.14

pipelines:
  default:
    - step:
        name: ⚡ PREPARE ENV
        caches:
          - pip
          - uv-cache
        script:
          # Install uv and create virtual environment
          - pip install --upgrade pip
          - pip install uv
          - uv venv --python 3.14
          - source .venv/bin/activate

          # Install all dependencies once
          - uv sync
        artifacts:
          - .venv/**  # Save the virtual env for next stages
          
    - step:
        name: 🧪 TEST
        caches:
          - pip
          - uv-cache
        script:
          - source .venv/bin/activate
          - uv pytest --maxfail=1 --disable-warnings --junitxml=test-reports/report.xml
        artifacts:
          - .venv/**

    - step:
        name: 📦 BUILD
        caches:
          - pip
          - uv-cache
        script:
          - source .venv/bin/activate
          - uv build
        artifacts:
          - dist/**
          - .venv/**

    - step:
        name: 🚀 PUBLISH
        deployment: production
        caches:
          - pip
          - uv-cache
        script:
          - source .venv/bin/activate
          - uv publish

definitions:
  caches:
    uv-cache: ~/.cache/uv