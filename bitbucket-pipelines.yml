image: python:3.14

pipelines:
  tags:
    "*.*.*":
      - step: &test
          name: TEST
          caches:
            - pip
            - uv-cache
          script:
            # Only run if tag is on 'develop' branch
            - echo "Tag: $BITBUCKET_TAG"
            - echo "Branch: $BITBUCKET_BRANCH"
            - if [ "$BITBUCKET_BRANCH" != "develop" ]; then
                echo "Tag is not on develop branch. Skipping pipeline.";
                exit 0;
              fi

            # Install uv and setup environment
            - pip install --upgrade pip
            - pip install uv
            - uv venv --python 3.14
            - source .venv/bin/activate
            - uv sync

            # Run tests
            - uv pytest --maxfail=1 --disable-warnings --junitxml=test-reports/report.xml

      - step: &build
          name: BUILD
          caches:
            - pip
            - uv-cache
          script:
            - source .venv/bin/activate
            - uv build
          artifacts:
            - dist/**

      - step: &publish
          name: PUBLISH
          deployment: production
          script:
            - source .venv/bin/activate
            - uv publish
            
definitions:
  caches:
    uv-cache: ~/.cache/uv