name: Feature Request
description: Suggest a new feature or improvement
title: "FEATURE -  "
labels: ["FEATURE"]
assignees: []

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
      placeholder: Describe the pain point
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Describe your idea
    validations:
      required: true