name: CI/CD Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  test:
    name: 🧪 TEST
    runs-on: ubuntu-latest
    container:
      image: python:3.14
    steps:
      - uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
          key: ${{ runner.os }}-deps-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-deps-

      - name: Install dependencies
        run: |
          pip install --upgrade pip uv
          uv sync

      - name: Run tests
        run: |
          uv run pytest --maxfail=1 --disable-warnings

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: test-reports/

  build:
    name: 📦 BUILD
    runs-on: ubuntu-latest
    container:
      image: python:3.14
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
          key: ${{ runner.os }}-deps-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-deps-

      - name: Install dependencies
        run: |
          pip install --upgrade pip uv
          uv sync

      - name: Build package
        run: |
          uv build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: 🚀 PUBLISH
    runs-on: ubuntu-latest
    container:
      image: python:3.14
    needs: build
    if: github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install uv
        run: pip install --upgrade pip uv

      - name: Publish to TestPyPI (develop)
        if: github.ref_name == 'develop'
        env:
          UV_TEST_PYPI_URL: ${{ vars.TEST_PYPI_URL }}
          UV_PUBLISH_TOKEN: ${{ secrets.TEST_PYPI_TOKEN }}
        run: |
          echo "Publishing to TestPyPI..."
          uv publish --publish-url "$UV_TEST_PYPI_URL"

      - name: Publish to PyPI (main)
        if: github.ref_name == 'main'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.RELEASE_PYPI_TOKEN }}
        run: |
          echo "Publishing to PyPI..."
          uv publish