connector:
  - &alpha_vantage
    name: alpha_vantage
    type: api
    base_url: https://www.alphavantage.co
    timeout: 5
    retry: 3
    auth:
      type: token
      key_name: api_token
      key_value: ${ALPHA_VANTAGE_API_KEY}

  - &yahoo_finance
    name: yahoo_finance
    type: api
    base_url: https://query1.finance.yahoo.com
    timeout: 5
    retry: 3
    auth:
      type: none

  - &local_fs
    name: local_fs
    type: file
    base_path: ./data/files
    auth:
      type: none

  - &postgres
    name: postgres
    type: database
    engine: postgres_sql
    host: ${DB_HOST}
    port: 5432
    default_name: ${DB_NAME}
    pool:
      min: 2
      max: 10
    auth:
      type: basic
      username: ${DB_USER}
      password: ${DB_PASSWORD}

  - &telemetry
      name: OpenTelemetry
      type: telemetry
      host: http://localhost
      port: 4317
      auth:
        type: none

operation:
  - &intraday_stock
    name: intraday_series
    connector: *alpha_vantage
    endpoint: /query
    method: GET
    parameters:
      function: TIME_SERIES_INTRADAY
      symbol: ["IBM"]
      interval: 5min

  - &intraday_chart
    name: yahoo_chart
    connector: *yahoo_finance
    endpoint: /v8/finance/chart
    method: GET
    parameters:
      symbol: ["IBM"]

cronjob:
  - &get_intraday_stock
    name: get_intraday_stock
    operation: *intraday_stock
    cron: "*/5 9-17 * * 1-5"

  - &get_intraday_chart
    name: get_intraday_chart
    operation: *intraday_chart
    cron: "*/5 9-17 * * 1-5"

app_configuration:
  env: debug
  run: async
  connector:
    api: {
      alpha_vantage: *alpha_vantage,
      yahoo_finance: *yahoo_finance
    }
    file: {
        local_fs: *local_fs
    }
    cache: {}
    database: {
      postgres: *postgres
    }
    telemetry: {
      open_telemetry: *telemetry
    }
  operation: {
    intraday_stock: *intraday_stock,
    intraday_chart: *intraday_chart
  }
  cronjob:
    - *get_intraday_stock
    - *get_intraday_chart